---
title : Archive
layout: blog-default
---
<div class="page pb-5">
    {% assign sorted_posts = site.posts | sort:'date' | reverse %}
    <article class="posts content-container">
        <h1>Post Archive</h1>
        <div class="posts-grid mt-5">
            {% for post in sorted_posts %}
            <a href="{{site.baseurl}}{{ post.url }}" class="post-card">
                <div class="post-card-content">
                    <div class="date">
                        <i class="far fa-calendar-alt"></i>
                        {{ post.date | date: "%B %-d, %Y" }}
                    </div>
                    <h2>{{ post.title }}</h2>
                    <p>{{ post.shortdesc }}</p>
                </div>
                <div class="post-card-footer">
                    <span class="read-more">Read Story <i class="fas fa-arrow-right ml-1"></i></span>
                    <img src="https://res.cloudinary.com/stuartlittle/image/upload/q_26/v1587837325/me/mars-min-2.png" alt="Mars Icon">
                </div>
            </a>
            {% endfor %}
        </div>
    </article>
</div>
